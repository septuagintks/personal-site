<!doctype html>
<html lang="zh">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Septuagint</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <style>
      :root {
        --card-bg: rgba(20, 20, 40, 0.55);
        --text: #fff;
        --subtext: rgba(255, 255, 255, 0.6);
        --link-bg: rgba(255, 255, 255, 0.1);
        --link-hover: rgba(255, 255, 255, 0.22);
        --accent: rgba(167, 139, 250, 0.8);
      }
      .light {
        --card-bg: rgba(255, 255, 255, 0.25);
        --text: #1a1a2e;
        --subtext: #555;
        --link-bg: rgba(100, 80, 200, 0.08);
        --link-hover: rgba(100, 80, 200, 0.18);
        --accent: rgba(100, 80, 200, 0.65);
      }
      *,
      ::after,
      ::before {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background:
          radial-gradient(
            circle at center,
            rgba(13, 13, 26, 0.95) 0,
            rgba(13, 13, 26, 0.5) 100%
          ),
          url("bg.jpg") center/cover no-repeat;
        opacity: 0;
        filter: blur(10px);
        animation: pageIn 1.2s ease forwards;
      }
      body.light {
        background:
          radial-gradient(
            circle at center,
            rgba(255, 255, 255, 0.95) 0,
            rgba(255, 255, 255, 0.3) 100%
          ),
          url("bg.jpg") center/cover no-repeat;
      }
      @keyframes pageIn {
        to {
          opacity: 1;
          filter: blur(0);
        }
      }
      #particles {
        position: fixed;
        inset: 0;
        z-index: 0;
        pointer-events: none;
      }
      .card {
        position: relative;
        z-index: 1;
        backdrop-filter: blur(24px) saturate(160%);
        background: var(--card-bg);
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 24px;
        padding: 44px 32px;
        width: 340px;
        text-align: center;
        color: var(--text);
        box-shadow: 0 24px 60px rgba(0, 0, 0, 0.35);
        animation: cardIn 0.9s cubic-bezier(0.34, 1.56, 0.64, 1) both;
        transform-style: preserve-3d;
        transition: transform 0.2s ease;
        --glow-size: 30%;
        --x: 50%;
        --y: 50%;
      }
      body.light .card {
        --glow-size: 40%;
      }
      @keyframes cardIn {
        from {
          opacity: 0;
          transform: translateY(48px) scale(0.92);
        }
        to {
          opacity: 1;
          transform: translateY(0) scale(1);
        }
      }
      .card::before {
        content: "";
        position: absolute;
        inset: -1px;
        border-radius: 25px;
        background: linear-gradient(
          135deg,
          rgba(255, 255, 255, 0.15),
          transparent 50%,
          rgba(167, 139, 250, 0.15)
        );
        pointer-events: none;
        z-index: -1;
      }
      .avatar-wrap {
        position: relative;
        display: inline-block;
        margin-bottom: 20px;
      }
      .avatar {
        width: 110px;
        height: 110px;
        border-radius: 50%;
        display: block;
        transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      }
      .avatar:hover {
        transform: scale(1.08) rotate(3deg);
      }
      .avatar-wrap::after,
      .avatar-wrap::before {
        content: "";
        position: absolute;
        inset: -4px;
        border-radius: 50%;
        border: 2px solid var(--accent);
        animation: ring 3s ease-out infinite;
      }
      .avatar-wrap::after {
        animation-delay: 1.5s;
      }
      @keyframes ring {
        0% {
          transform: scale(1);
          opacity: 0.8;
        }
        100% {
          transform: scale(1.6);
          opacity: 0;
        }
      }
      h1 {
        font-size: 26px;
        margin: 0 0 10px;
        display: inline-block;
        white-space: nowrap;
        overflow: hidden;
        border-right: 2px solid var(--text);
        animation: blink 0.75s step-end infinite;
        animation-play-state: paused;
      }
      h1.done {
        animation-play-state: running;
      }
      @keyframes blink {
        0%,
        100% {
          border-color: var(--text);
        }
        50% {
          border-color: transparent;
        }
      }
      p {
        color: var(--subtext);
        font-size: 14px;
        margin: 0 0 26px;
        animation: fadeUp 0.6s 0.4s ease both;
      }
      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .links a {
        position: relative;
        overflow: hidden;
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 10px;
        text-decoration: none;
        color: var(--text);
        background: var(--link-bg);
        padding: 12px;
        margin: 8px 0;
        border-radius: 12px;
        border: 1px solid rgba(255, 255, 255, 0.07);
        transition:
          transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1),
          background 0.2s,
          box-shadow 0.2s,
          scale 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
        opacity: 0;
        animation: linkIn 0.5s ease forwards;
      }
      .links a:first-child {
        animation-delay: 0.55s;
      }
      .links a:nth-child(2) {
        animation-delay: 0.65s;
      }
      .links a:nth-child(3) {
        animation-delay: 0.75s;
      }
      .links a:nth-child(4) {
        animation-delay: 0.85s;
      }
      .links a:nth-child(5) {
        animation-delay: 0.95s;
      }
      .links a:nth-child(6) {
        animation-delay: 1.05s;
      }
      @keyframes linkIn {
        from {
          opacity: 0;
          transform: translateX(-18px);
        }
        to {
          opacity: 1;
          transform: translateX(0);
        }
      }
      .links a:hover {
        background: var(--link-hover);
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
        scale: 1.07;
      }
      .links a:active {
        scale: 0.93;
        box-shadow: 0 2px 6px rgba(0, 0, 0, 0.15);
        transition:
          scale 0.08s ease,
          background 0.2s,
          box-shadow 0.2s;
      }
      .ripple {
        position: absolute;
        border-radius: 50%;
        width: 0;
        height: 0;
        background: rgba(255, 255, 255, 0.25);
        transform: translate(-50%, -50%);
        animation: rippleAnim 0.6s ease-out forwards;
        pointer-events: none;
      }
      @keyframes rippleAnim {
        to {
          width: 320px;
          height: 320px;
          opacity: 0;
        }
      }
      .toggle {
        position: fixed;
        top: 20px;
        right: 20px;
        z-index: 10;
        cursor: pointer;
        font-size: 20px;
        background: var(--card-bg);
        border: 1px solid rgba(255, 255, 255, 0.15);
        border-radius: 50%;
        width: 44px;
        height: 44px;
        display: flex;
        align-items: center;
        justify-content: center;
        backdrop-filter: blur(12px);
        transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        color: var(--text);
        user-select: none;
      }
      .toggle:hover {
        transform: scale(1.15) rotate(20deg);
      }
      .toggle:active {
        transform: scale(0.9);
      }
      .card::after {
        content: "";
        position: absolute;
        inset: 0;
        border-radius: 24px;
        pointer-events: none;
        background: radial-gradient(
          circle at var(--x) var(--y),
          rgba(255, 255, 255, 0.25),
          transparent var(--glow-size)
        );
      }
      body.light .card::after {
        content: "";
        position: absolute;
        inset: 0;
        border-radius: 24px;
        pointer-events: none;
        background: radial-gradient(
          circle at var(--x) var(--y),
          rgba(100, 80, 200, 0.18),
          transparent var(--glow-size)
        );
      }
      body.light .toggle {
        background: rgba(100, 80, 200, 0.2);
        border-color: rgba(100, 80, 200, 0.35);
      }
    </style>
  </head>

  <body>
    <canvas id="particles"></canvas>

    <div class="toggle" id="themeToggle" onclick="toggleTheme()" title="切换主题">🌓</div>

    <div class="card">
      <div class="avatar-wrap">
        <!-- 修复7：图片加载失败兜底 -->
        <img
          src="avatar.jpg"
          class="avatar"
          alt="avatar"
          onerror="
            this.src =
              'https://ui-avatars.com/api/?name=S&background=7c3aed&color=fff&size=110'
          "
        />
      </div>

      <h1 id="name"></h1>
      <p>Computing the universe with me, Conquering the world for you</p>

      <div class="links">
        <!-- 修复6：添加 rel 安全属性 -->
        <a
          href="https://steamcommunity.com/id/septugaint"
          rel="noopener noreferrer"
          ><i class="fab fa-steam"></i> Steam</a
        >
        <a href="https://github.com/septuagintks" rel="noopener noreferrer"
          ><i class="fab fa-github"></i> GitHub</a
        >
        <a href="https://discord.gg/2TCxargaSe" rel="noopener noreferrer"
          ><i class="fab fa-discord"></i> Discord</a
        >
        <a href="https://x.com/septuagint0504" rel="noopener noreferrer"
          ><i class="fab fa-x-twitter"></i> X</a
        >
        <a href="mailto:septuagintks@gmail.com"
          ><i class="fas fa-envelope"></i> Email</a
        >
        <a href="https://www.pixiv.net/users/81025946" rel="noopener noreferrer"
          ><i class="fas fa-palette"></i> Pixiv</a
        >
      </div>
    </div>

    <script>
      let mouse = { x: null, y: null };
      window.addEventListener("mousemove", (e) => {
        ((mouse.x = e.clientX), (mouse.y = e.clientY));
      });
      const card = document.querySelector(".card");
      const themeToggle = document.getElementById("themeToggle");
      let cardScale = 1;
      card.addEventListener("mouseenter", () => {
        cardScale = 1.04;
      });
      card.addEventListener("mouseleave", () => {
        cardScale = 1;
        card.style.transform = "rotateY(0deg) rotateX(0deg) scale(1)";
      });
      card.addEventListener("mousedown", () => {
        cardScale = 0.98;
      });
      card.addEventListener("mouseup", () => {
        cardScale = 1.04;
      });
      document.addEventListener("mousemove", (e) => {
        const rotateY = 20 * (e.clientX / window.innerWidth - 0.5);
        const rotateX = 20 * (e.clientY / window.innerHeight - 0.5);
        card.style.transform = `rotateY(${rotateY}deg) rotateX(${-rotateX}deg) scale(${cardScale})`;
      });
      const text = "Septuagint";
      const nameEl = document.getElementById("name");
      let i = 0;
      const systemMedia = window.matchMedia("(prefers-color-scheme: light)");
      function applyTheme(theme) {
        const isSystem = theme === "system";
        if (isSystem) {
          document.body.classList.toggle("light", systemMedia.matches);
        } else {
          document.body.classList.toggle("light", theme === "light");
        }
        localStorage.setItem("theme", theme);
        updateThemeButton(theme);
      }
      function updateThemeButton(theme) {
        if (!themeToggle) return;
        if (theme === "system") {
          themeToggle.textContent = "💻";
          themeToggle.title = "系统主题（当前根据系统切换）";
        } else if (theme === "light") {
          themeToggle.textContent = "☀️";
          themeToggle.title = "浅色主题";
        } else {
          themeToggle.textContent = "🌙";
          themeToggle.title = "深色主题";
        }
      }
      function getStoredTheme() {
        return localStorage.getItem("theme") || "system";
      }
      function toggleTheme() {
        const current = getStoredTheme();
        const next = current === "dark" ? "light" : current === "light" ? "system" : "dark";
        applyTheme(next);
      }
      systemMedia.addEventListener("change", () => {
        if (getStoredTheme() === "system") {
          applyTheme("system");
        }
      });
      (function typeName() {
        if (i < text.length) {
          nameEl.textContent += text[i++];
          setTimeout(typeName, 110);
        } else {
          nameEl.classList.add("done");
        }
      })();
      applyTheme(getStoredTheme());
      document.querySelectorAll(".links a").forEach((e) => {
        e.addEventListener("click", function (event) {
          const ripple = document.createElement("span");
          ripple.className = "ripple";
          const rect = this.getBoundingClientRect();
          ripple.style.left = event.clientX - rect.left + "px";
          ripple.style.top = event.clientY - rect.top + "px";
          this.appendChild(ripple);
          setTimeout(() => ripple.remove(), 600);
        });
      });
      (function () {
        const canvas = document.getElementById("particles");
        const ctx = canvas.getContext("2d");
        let width, height, particles;
        function resize() {
          width = (canvas.width = innerWidth);
          height = (canvas.height = innerHeight);
          particles = Array.from({ length: 55 }, () => ({
            x: Math.random() * width,
            y: Math.random() * height,
            vx: 0.5 * (Math.random() - 0.5),
            vy: 0.5 * (Math.random() - 0.5),
            r: 1.5 * Math.random() + 0.5,
          }));
        }
        resize();
        (function render() {
          ctx.clearRect(0, 0, width, height);
          const color = document.body.classList.contains("light") ? "80,60,180" : "200,190,255";
          for (const particle of particles) {
            if (mouse.x) {
              const dx = mouse.x - particle.x;
              const dy = mouse.y - particle.y;
              if (Math.sqrt(dx * dx + dy * dy) < 120) {
                particle.x -= 0.01 * dx;
                particle.y -= 0.01 * dy;
              }
            }
            particle.x += particle.vx;
            particle.y += particle.vy;
            if (particle.x < 0 || particle.x > width) particle.vx *= -1;
            if (particle.y < 0 || particle.y > height) particle.vy *= -1;
            ctx.beginPath();
            ctx.arc(particle.x, particle.y, particle.r, 0, 2 * Math.PI);
            ctx.fillStyle = `rgba(${color},.5)`;
            ctx.fill();
          }
          for (let index = 0; index < particles.length; index++) {
            for (let j = index + 1; j < particles.length; j++) {
              const dx = particles[index].x - particles[j].x;
              const dy = particles[index].y - particles[j].y;
              const distance = Math.sqrt(dx * dx + dy * dy);
              if (distance < 130) {
                ctx.beginPath();
                ctx.moveTo(particles[index].x, particles[index].y);
                ctx.lineTo(particles[j].x, particles[j].y);
                ctx.strokeStyle = `rgba(${color},${0.18 * (1 - distance / 130)})`;
                ctx.lineWidth = 0.6;
                ctx.stroke();
              }
            }
          }
          requestAnimationFrame(render);
        })();
        window.addEventListener("resize", resize);
      })();
      document.addEventListener("mousemove", (e) => {
        const rect = card.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;
        card.style.setProperty("--x", x + "px");
        card.style.setProperty("--y", y + "px");
        const centerX = window.innerWidth / 2;
        const centerY = window.innerHeight / 2;
        const dist = Math.sqrt((e.clientX - centerX) ** 2 + (e.clientY - centerY) ** 2);
        const maxDist = Math.sqrt(centerX * centerX + centerY * centerY);
        const ratio = Math.min(dist / maxDist, 1);
        const glowBase = document.body.classList.contains("light") ? 40 : 30;
        const glowSize = glowBase - (glowBase - 5) * ratio;
        card.style.setProperty("--glow-size", glowSize + "%");
      });
      document.querySelectorAll(".links a").forEach((a) => {
        a.addEventListener("mousemove", (e) => {
          const rect = a.getBoundingClientRect();
          const offsetX = e.clientX - rect.left - rect.width / 2;
          const offsetY = e.clientY - rect.top - rect.height / 2;
          a.style.transform = `translate(${0.15 * offsetX}px, ${0.2 * offsetY}px)`;
        });
        a.addEventListener("mouseleave", () => {
          a.style.transform = "";
        });
      });
    </script>
  </body>
</html>
